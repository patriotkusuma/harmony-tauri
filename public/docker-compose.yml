services:
    web:
        image: nginx:latest
        container_name: kasir-harmonylaundry
        ports:
            - "127.0.0.1:8083:80"
        volumes:
            - ./:/usr/share/nginx/html/
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
        restart: always

networks:
  default:
    external: true
    name: proxy_network